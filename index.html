<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Барабан</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#f0f2f5">

  <script src="js/vendor/three.min.js"></script>
</head>

<body>
  <div class="app">
    <div class="sidebar">
      <h2>Список</h2>
      <textarea id="itemsInput" placeholder="Введите пункты, каждый с новой строки...">Алексей Галкин
Артем Филиппов
Кирилл Лобанов
Николай Михалаки
Сергей Абкарян
Сергей Бубенцов</textarea>
      <button id="applyBtn">Применить</button>
      <ul id="statusList"></ul>
      <div id="result" class="result"></div>
    </div>
    <div class="drum-container" id="drumContainer">
      <div class="hint">Нажмите и удерживайте на барабане, чтобы раскрутить</div>
    </div>
  </div>
  <!-- Winner modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <p class="modal-title">Ведущий встречи:</p>
      <p class="modal-name" id="modalName"></p>
      <button id="modalOkBtn" class="modal-ok">OK</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
